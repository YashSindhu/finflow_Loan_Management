<div class="auth-wrapper">
  <div class="auth-box">
    <h2>FinFlow</h2>
    <p>Sign in to your account</p>

    @if (expiredMessage) {
      <div class="alert alert-info">{{ expiredMessage }}</div>
    }
    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="form.email" required placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div style="position:relative">
          <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="form.password" required placeholder="••••••••" autocomplete="current-password" style="padding-right:40px" />
          <span (click)="showPassword = !showPassword" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#7f8c8d; font-size:13px">
            {{ showPassword ? 'Hide' : 'Show' }}
          </span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-center mt-16" style="font-size:13px; color:#7f8c8d">
      No account? <a routerLink="/register" style="color:#4a90e2">Register here</a>
    </p>
  </div>
</div>
