spring.application.name=api-gateway
server.port=8080

# Config Server
spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Auth Service public routes (no JWT filter) 楳
spring.cloud.gateway.routes[0].id=auth-register
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/gateway/auth/register
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/gateway/auth/register, /auth/register

spring.cloud.gateway.routes[1].id=auth-register-admin
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/gateway/auth/register/admin
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/gateway/auth/register/admin, /auth/register/admin

spring.cloud.gateway.routes[2].id=auth-login
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/gateway/auth/login
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/gateway/auth/login, /auth/login

spring.cloud.gateway.routes[3].id=auth-validate
spring.cloud.gateway.routes[3].uri=lb://auth-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/gateway/auth/validate
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/gateway/auth/validate, /auth/validate

# Auth Service admin routes (JWT protected)楳
spring.cloud.gateway.routes[4].id=auth-admin
spring.cloud.gateway.routes[4].uri=lb://auth-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/gateway/auth/admin/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/gateway/auth/admin/(?<segment>.*), /auth/admin/${segment}
spring.cloud.gateway.routes[4].filters[1]=JwtAuthFilter

# Application Service routes (JWT protected) 楳
spring.cloud.gateway.routes[5].id=application-service
spring.cloud.gateway.routes[5].uri=lb://application-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/gateway/applications,/gateway/applications/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/gateway/applications/(?<segment>.*), /applications/${segment}
spring.cloud.gateway.routes[5].filters[1]=RewritePath=/gateway/applications, /applications
spring.cloud.gateway.routes[5].filters[2]=JwtAuthFilter

# Document Service routes (JWT protected) 楳
spring.cloud.gateway.routes[6].id=document-service
spring.cloud.gateway.routes[6].uri=lb://document-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/gateway/documents/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/gateway/documents/(?<segment>.*), /documents/${segment}
spring.cloud.gateway.routes[6].filters[1]=JwtAuthFilter

# Admin Service routes (JWT protected)楳
spring.cloud.gateway.routes[7].id=admin-service
spring.cloud.gateway.routes[7].uri=lb://admin-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/gateway/admin/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/gateway/admin/(?<segment>.*), /admin/${segment}
spring.cloud.gateway.routes[7].filters[1]=JwtAuthFilter

# Products route (public, no JWT filter)楳
spring.cloud.gateway.routes[8].id=products
spring.cloud.gateway.routes[8].uri=lb://admin-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/gateway/products
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/gateway/products, /products

# Swagger API docs routes楳
spring.cloud.gateway.routes[9].id=auth-service-docs
spring.cloud.gateway.routes[9].uri=lb://auth-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/docs/auth-service/**
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/docs/auth-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[10].id=application-service-docs
spring.cloud.gateway.routes[10].uri=lb://application-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/docs/application-service/**
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/docs/application-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[11].id=document-service-docs
spring.cloud.gateway.routes[11].uri=lb://document-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/docs/document-service/**
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/docs/document-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[12].id=admin-service-docs
spring.cloud.gateway.routes[12].uri=lb://admin-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/docs/admin-service/**
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/docs/admin-service/(?<segment>.*), /${segment}

# Springdoc aggregation 楳
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/docs/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Application Service
springdoc.swagger-ui.urls[1].url=/docs/application-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Document Service
springdoc.swagger-ui.urls[2].url=/docs/document-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/docs/admin-service/v3/api-docs
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.endpoints.web.exposure.include=*
